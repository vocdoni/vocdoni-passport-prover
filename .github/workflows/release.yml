# Release Workflow
#
# Creates a GitHub release and pushes Docker images when a version tag is pushed.
# Docker builds run on self-hosted runners due to heavy build requirements.
#
# Copyright (c) 2024 Vocdoni Association
# SPDX-License-Identifier: AGPL-3.0-or-later

name: Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  PROVER_IMAGE: ghcr.io/${{ github.repository }}
  SERVER_IMAGE: ghcr.io/${{ github.repository }}-server

jobs:
  # Determine version
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

  # Run tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: server-go/go.sum

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Rust tests
        run: cargo test --release

      - name: Run Go tests
        working-directory: server-go
        run: go test -v ./...

  # Build and push Docker images (on self-hosted runner)
  docker:
    name: Build & Push Docker Images
    runs-on: [self-hosted, linux, X64]
    timeout-minutes: 180
    needs: [prepare, test]
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: prover
            dockerfile: Dockerfile
            image_suffix: ""
          - name: server
            dockerfile: server-go/Dockerfile
            image_suffix: "-server"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image_suffix }}:${{ needs.prepare.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}${{ matrix.image_suffix }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # Create GitHub Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [prepare, docker]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          draft: false
          generate_release_notes: true
          body: |
            ## Docker Images

            Pull the server image:
            ```bash
            docker pull ghcr.io/${{ github.repository }}-server:${{ needs.prepare.outputs.version }}
            ```

            Pull the prover CLI image:
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.version }}
            ```

            ## Quick Start

            ```bash
            # Clone and configure
            git clone https://github.com/${{ github.repository }}.git
            cd vocdoni-passport-prover/server-go
            cp .env.example .env
            # Edit .env with your settings

            # Start with Docker Compose
            docker compose up -d
            ```

            See the [README](https://github.com/${{ github.repository }}#readme) for full documentation.
