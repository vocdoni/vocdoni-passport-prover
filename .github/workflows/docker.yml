# Docker Build Workflow
#
# Builds and optionally pushes Docker images for the prover and server.
# Runs on self-hosted runners due to heavy build requirements.
#
# Note: Images are only pushed on manual trigger with push_images=true
# or when a release tag is pushed. Regular pushes only verify the build.
#
# Copyright (c) 2024 Vocdoni Association
# SPDX-License-Identifier: AGPL-3.0-or-later

name: Docker Build

on:
  workflow_dispatch:
    inputs:
      push_images:
        description: "Push images to registry"
        required: false
        default: false
        type: boolean

  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "server-go/Dockerfile"
      - "crates/**"
      - "server-go/**"
      - "docker/**"
      - "artifacts/**"
      - ".github/workflows/docker.yml"

  pull_request:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "server-go/Dockerfile"

env:
  REGISTRY: ghcr.io
  PROVER_IMAGE: ghcr.io/${{ github.repository }}
  SERVER_IMAGE: ghcr.io/${{ github.repository }}-server

jobs:
  # Build prover CLI image
  build-prover:
    name: Build Prover Image
    runs-on: [self-hosted]
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: inputs.push_images == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.PROVER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build prover image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ inputs.push_images == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # Build server image
  build-server:
    name: Build Server Image
    runs-on: [self-hosted]
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: inputs.push_images == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SERVER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server-go/Dockerfile
          push: ${{ inputs.push_images == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
